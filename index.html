<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System VR</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<a-scene cursor="rayOrigin: mouse" raycaster="objects: .clickable">

<!-- ASSETS -->
<a-assets>
    <a-asset-item id="sunModel" src="sun.glb"></a-asset-item>
    <a-asset-item id="earthModel" src="globe.glb"></a-asset-item>
    <a-asset-item id="moonModel" src="moon.glb"></a-asset-item>
</a-assets>

<!-- SKY -->
<a-sky color="#000011"></a-sky>

<!-- LIGHTING -->
<a-light type="ambient" intensity="0.6"></a-light>
<a-light type="directional" intensity="1.2" position="5 10 5"></a-light>

<!-- CAMERA -->
<a-camera position="0 6 20" rotation="-10 0 0">
    <a-cursor></a-cursor>
</a-camera>

<!-- SOLAR SYSTEM -->
<a-entity position="0 6 -10">

    <!-- SUN -->
    <a-gltf-model src="#sunModel"
        scale="2 2 2"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 40000">
    </a-gltf-model>

    <!-- SUN LIGHT -->
    <a-light type="point" intensity="3" distance="50" color="#ffaa00"></a-light>

    <!-- EARTH ORBIT -->
    <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 20000">

        <a-entity position="15 -2 0">

            <!-- EARTH -->
            <a-gltf-model src="#earthModel"
                class="clickable"
                scale="0.2 0.2 0.2"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
            </a-gltf-model>

            <!-- EARTH LIGHT -->
            <a-light type="point" intensity="1.5" distance="15" position="0 2 2"></a-light>

            <!-- MOON ORBIT -->
            <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">

                <!-- MOON -->
                <a-gltf-model src="#moonModel"
                    position="3 2awds 0"
                    scale="0.2 0.2 0.2">
                </a-gltf-model>

            </a-entity>

        </a-entity>

    </a-entity>

</a-entity>

</a-scene>

<script>

// INTERACTION
document.querySelector('a-scene').addEventListener('loaded', () => {

    document.querySelectorAll(".clickable").forEach(el => {

        el.addEventListener("click", () => {

            const colors = ["#00f2ff", "#ff00ff", "#7b00ff", "#f5d300"];
            const c = colors[Math.floor(Math.random() * colors.length)];

            el.setAttribute("material", "color", c);
            el.setAttribute("material", "emissive", c);

            el.setAttribute("animation__scale", {
                property: "scale",
                to: "1.3 1.3 1.3",
                dur: 200,
                dir: "alternate"
            });

        });

    });

});


// 🔥 REMOVE WALL-LIKE MESHES FROM MODELS
document.querySelectorAll('a-gltf-model').forEach(model => {

    model.addEventListener('model-loaded', () => {

        const obj = model.getObject3D('mesh');

        obj.traverse((node) => {

            if (node.isMesh) {

                // Compute size
                const box = new THREE.Box3().setFromObject(node);
                const size = new THREE.Vector3();
                box.getSize(size);

                // Remove large unwanted geometry (walls)
                if (size.x > 50 || size.y > 50 || size.z > 50) {
                    node.visible = false;
                }

            }

        });

    });

});

</script>

</body>
</html>
